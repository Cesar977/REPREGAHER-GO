<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil - REPREGAHER</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <div class="navbar-logo">
    <img src="img/Logo.png" alt="Repregaher Logo">
  </div>
  <ul class="navbar-links">
    <li><a href="index.html">Inicio</a></li>
    <li><a href="movimientos.html">Movimientos</a></li>
    <li><a href="reportes.html">Reportes</a></li>
    <li><a href="inventario.html">Inventario</a></li>
    <li><a href="alertas.html">Alertas</a></li>
    <button id="theme-toggle" class="theme-btn">🌙</button>
  </ul>
</nav>

<main class="formulario-contenedor">
  <section class="contenido">
    <div class="perfil-card">
      <div class="perfil-header">
        <div class="avatar-wrapper">
          <img id="profile-photo-preview" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%236e6e73'%3E%3Cpath d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/%3E%3C/svg%3E" alt="Foto de perfil">
          <label for="profile-photo-input" class="avatar-overlay">Cambiar foto</label>
          <input id="profile-photo-input" type="file" accept="image/*">
        </div>
        <div class="perfil-texto">
          <h1>Mi perfil</h1>
          <p>Actualiza tu foto y revisa tus datos personales.</p>
          <div class="perfil-actions">
            <button id="upload-photo-btn" class="btn-secondary" style="display:none;">Guardar foto</button>
            <button id="update-data-btn" class="btn-secondary">Actualizar datos</button>
            <button id="logout-btn" class="btn-clear">Cerrar sesión</button>
          </div>
        </div>
      </div>

      <div class="profile-info-grid" id="profile-info">
        <div class="profile-info-row">
          <span>Nombre</span>
          <strong id="profile-nombre">-</strong>
        </div>
        <div class="profile-info-row">
          <span>Cargo</span>
          <strong id="profile-cargo">-</strong>
        </div>
        <div class="profile-info-row">
          <span>Fecha de nacimiento</span>
          <strong id="profile-fecha">-</strong>
        </div>
        <div class="profile-info-row">
          <span>Cédula</span>
          <strong id="profile-cedula">-</strong>
        </div>
        <div class="profile-info-row">
          <span>Correo</span>
          <strong id="profile-email">Cargando...</strong>
        </div>
        <div class="profile-info-row">
          <span>UID</span>
          <strong id="profile-uid">Cargando...</strong>
        </div>
      </div>
    </div>
  </section>
</main>

<!-- MODAL PARA EDITAR DATOS -->
<div id="modal-edit" class="modal" style="display:none;">
  <div class="modal-content">
    <div class="modal-header">
      <h2>Actualizar datos personales</h2>
      <button id="modal-close" class="modal-close-btn">&times;</button>
    </div>
    <form id="edit-form" class="modal-form">
      <div class="form-group">
        <label for="edit-nombre">Nombre *</label>
        <input type="text" id="edit-nombre" required>
      </div>
      <div class="form-group">
        <label for="edit-cargo">Cargo</label>
        <input type="text" id="edit-cargo">
      </div>
      <div class="form-group">
        <label for="edit-fecha">Fecha de nacimiento *</label>
        <input type="date" id="edit-fecha" required>
      </div>
      <div class="form-group">
        <label for="edit-cedula">Cédula *</label>
        <input type="text" id="edit-cedula" required>
      </div>
      <div class="modal-actions">
        <button type="button" id="modal-cancel-btn" class="btn-clear">Cancelar</button>
        <button type="submit" id="modal-save-btn" class="btn-secondary">Guardar cambios</button>
      </div>
    </form>
    </div>
  </section>
</main>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
<script>
  // TEMA OSCURO
  const toggleBtn = document.getElementById("theme-toggle");
  const currentTheme = localStorage.getItem("theme");

  if (toggleBtn) {
    if (currentTheme === "dark") {
      document.body.classList.add("dark-theme");
      toggleBtn.textContent = "☀️";
    }

    toggleBtn.addEventListener("click", () => {
      document.body.classList.toggle("dark-theme");
      if (document.body.classList.contains("dark-theme")) {
        toggleBtn.textContent = "☀️";
        localStorage.setItem("theme", "dark");
      } else {
        toggleBtn.textContent = "🌙";
        localStorage.setItem("theme", "light");
      }
    });
  }

  const firebaseConfig = {
    apiKey: "AIzaSyB0S0gIC3efdIjONM7nZli2x4nwlgRTWNE",
    authDomain: "repregaher.firebaseapp.com",
    projectId: "repregaher",
    storageBucket: "repregaher.firebasestorage.app",
    messagingSenderId: "404425871100",
    appId: "1:404425871100:web:16cfdbca6427bc4e4e5179"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();
  const storage = firebase.storage();

  const profileEmail = document.getElementById('profile-email');
  const profileCargo = document.getElementById('profile-cargo');
  const profileUid = document.getElementById('profile-uid');
  const profileNombre = document.getElementById('profile-nombre');
  const profileFecha = document.getElementById('profile-fecha');
  const profileCedula = document.getElementById('profile-cedula');
  const profilePreview = document.getElementById('profile-photo-preview');
  const photoInput = document.getElementById('profile-photo-input');
  const uploadPhotoBtn = document.getElementById('upload-photo-btn');
  const updateDataBtn = document.getElementById('update-data-btn');
  const logoutBtn = document.getElementById('logout-btn');

  // ELEMENTOS DEL MODAL
  const modal = document.getElementById('modal-edit');
  const modalCloseBtn = document.getElementById('modal-close');
  const modalCancelBtn = document.getElementById('modal-cancel-btn');
  const editForm = document.getElementById('edit-form');
  const editNombre = document.getElementById('edit-nombre');
  const editFecha = document.getElementById('edit-fecha');
  const editCedula = document.getElementById('edit-cedula');
  const editCargo = document.getElementById('edit-cargo');

  auth.onAuthStateChanged(async (user) => {
    if (!user) {
      window.location.href = 'login.html';
      return;
    }

    profileEmail.textContent = user.email || '-';
    profileUid.textContent = user.uid || '-';

    try {
      const doc = await db.collection('usuarios').doc(user.uid).get();
      const data = doc.exists ? doc.data() : {};
      profileCargo.textContent = data.cargo || '-';
      profileNombre.textContent = data.nombre || '-';
      profileFecha.textContent = data.fechaNacimiento || '-';
      profileCedula.textContent = data.cedula || '-';

      // Cargar foto guardada en Firestore
      if (data.photoURL) {
        profilePreview.src = data.photoURL;
        console.log('Foto cargada desde Firestore:', data.photoURL);
      } else if (user.photoURL) {
        profilePreview.src = user.photoURL;
        console.log('Foto cargada desde Firebase Auth:', user.photoURL);
      } else {
        console.log('No hay foto guardada, usando placeholder');
      }
    } catch (error) {
      console.error('Error cargando datos de perfil:', error);
    }
  });

  photoInput.addEventListener('change', () => {
    const file = photoInput.files[0];
    if (!file) {
      uploadPhotoBtn.style.display = 'none';
      return;
    }
    uploadPhotoBtn.style.display = 'inline-block';
    profilePreview.src = URL.createObjectURL(file);
  });

  uploadPhotoBtn.addEventListener('click', async () => {
    const file = photoInput.files[0];
    if (!file) {
      alert('Selecciona una imagen antes de subirla.');
      return;
    }

    // Validar tipo de archivo
    if (!file.type.startsWith('image/')) {
      alert('El archivo no es una imagen válida.');
      return;
    }

    // Validar tamaño (máximo 5MB)
    if (file.size > 5 * 1024 * 1024) {
      alert('La imagen es muy grande. Máximo 5MB.');
      return;
    }

    uploadPhotoBtn.textContent = 'Subiendo... (0%)';
    uploadPhotoBtn.disabled = true;

    try {
      const user = auth.currentUser;
      if (!user) throw new Error('Usuario no autenticado');

      console.log('=== INICIANDO GUARDADO DE FOTO ===');
      console.log('Usuario:', user.uid);
      console.log('Archivo:', file.name, file.size, file.type);

      // Generar nombre único para la imagen
      const timestamp = new Date().getTime();
      const filename = `perfil/${user.uid}_${timestamp}.jpg`;
      const storageRef = storage.ref(filename);
      
      console.log('Ruta de almacenamiento:', filename);
      
      // Subir archivo a Storage con progreso
      const uploadTask = storageRef.put(file);
      
      uploadTask.on('state_changed', 
        (snapshot) => {
          const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
          uploadPhotoBtn.textContent = `Subiendo... (${Math.round(progress)}%)`;
          console.log('Progreso:', Math.round(progress) + '%');
        },
        (error) => {
          console.error('Error durante la subida:', error);
          throw error;
        }
      );

      const snapshot = await uploadTask;
      console.log('Archivo subido exitosamente');

      uploadPhotoBtn.textContent = 'Obteniendo URL...';
      const downloadURL = await snapshot.ref.getDownloadURL();
      
      console.log('URL obtenida:', downloadURL);

      // Guardar URL en Firestore
      uploadPhotoBtn.textContent = 'Guardando en base de datos...';
      
      await db.collection('usuarios').doc(user.uid).set({ 
        photoURL: downloadURL,
        photoUpdated: new Date().toISOString()
      }, { merge: true });
      
      console.log('URL guardada en Firestore correctamente');

      // Actualizar perfil en Firebase Auth
      await user.updateProfile({ photoURL: downloadURL });
      console.log('Perfil de Firebase Auth actualizado');

      // Actualizar vista previa local
      profilePreview.src = downloadURL;
      
      alert('✅ Foto de perfil guardada correctamente.');
      uploadPhotoBtn.textContent = 'Guardar foto';
      uploadPhotoBtn.style.display = 'none';
      photoInput.value = '';
      
      console.log('=== GUARDADO COMPLETADO ===');
      
    } catch (error) {
      console.error('=== ERROR EN GUARDADO ===', error);
      console.error('Código:', error.code);
      console.error('Mensaje:', error.message);
      
      let mensajeError = error.message;
      
      if (error.code === 'storage/unauthorized') {
        mensajeError = 'No tienes permiso para guardar fotos. Revisa las reglas de Firebase Storage.';
      } else if (error.code === 'storage/unauthenticated') {
        mensajeError = 'Debes estar autenticado para guardar fotos.';
      } else if (error.code === 'permission-denied') {
        mensajeError = 'Permiso denegado. Revisa las reglas de Firestore y Firebase Storage.';
      }
      
      alert('❌ Error: ' + mensajeError);
      uploadPhotoBtn.textContent = 'Guardar foto';
      uploadPhotoBtn.style.display = 'none';
    }
  });

  logoutBtn.addEventListener('click', async () => {
    try {
      await auth.signOut();
      window.location.href = 'login.html';
    } catch (error) {
      alert('Error al cerrar sesión: ' + error.message);
    }
  });

  // ABRIR MODAL PARA EDITAR DATOS
  updateDataBtn.addEventListener('click', async () => {
    try {
      const user = auth.currentUser;
      if (!user) throw new Error('Usuario no autenticado');

      const doc = await db.collection('usuarios').doc(user.uid).get();
      const data = doc.exists ? doc.data() : {};

      editNombre.value = data.nombre || '';
      editCargo.value = data.cargo || '';
      editFecha.value = data.fechaNacimiento || '';
      editCedula.value = data.cedula || '';

      modal.style.display = 'flex';
    } catch (error) {
      console.error('Error abriendo modal:', error);
      alert('Error al abrir el formulario de edición.');
    }
  });

  // CERRAR MODAL
  modalCloseBtn.addEventListener('click', () => {
    modal.style.display = 'none';
  });

  modalCancelBtn.addEventListener('click', () => {
    modal.style.display = 'none';
  });

  // Cerrar modal si se hace clic fuera
  modal.addEventListener('click', (e) => {
    if (e.target === modal) {
      modal.style.display = 'none';
    }
  });

  // GUARDAR DATOS EDITADOS
  editForm.addEventListener('submit', async (e) => {
    e.preventDefault();

    const nombre = editNombre.value.trim();
    const cargo = editCargo.value.trim();
    const fecha = editFecha.value;
    const cedula = editCedula.value.trim();

    if (!nombre) {
      alert('El nombre es requerido.');
      return;
    }

    if (!fecha) {
      alert('La fecha de nacimiento es requerida.');
      return;
    }

    if (!cedula) {
      alert('La cédula es requerida.');
      return;
    }

    const modalSaveBtn = document.getElementById('modal-save-btn');
    modalSaveBtn.textContent = 'Guardando...';
    modalSaveBtn.disabled = true;

    try {
      const user = auth.currentUser;
      if (!user) throw new Error('Usuario no autenticado');

      console.log('=== ACTUALIZANDO DATOS ===');
      console.log('Nombre:', nombre);
      console.log('Cargo:', cargo);
      console.log('Fecha:', fecha);
      console.log('Cédula:', cedula);

      await db.collection('usuarios').doc(user.uid).set({
        nombre: nombre,
        cargo: cargo,
        fechaNacimiento: fecha,
        cedula: cedula,
        dataUpdated: new Date().toISOString()
      }, { merge: true });

      console.log('Datos guardados correctamente');

      // Actualizar vista
      profileNombre.textContent = nombre;
      profileCargo.textContent = cargo || '-';
      profileFecha.textContent = fecha;
      profileCedula.textContent = cedula;

      alert('✅ Datos actualizados correctamente.');
      modal.style.display = 'none';
      modalSaveBtn.textContent = 'Guardar cambios';
      modalSaveBtn.disabled = false;

    } catch (error) {
      console.error('Error actualizando datos:', error);
      alert('❌ Error al actualizar datos: ' + error.message);
      modalSaveBtn.textContent = 'Guardar cambios';
      modalSaveBtn.disabled = false;
    }
  });
</script>

</body>
</html>
