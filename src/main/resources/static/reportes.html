<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reportes</title>

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
</head>

<body>

  <nav class="navbar" data-aos="fade-down">
    <div class="navbar-logo">
  <img src="img/Logo.png" alt="Repregaher Logo">
</div>
    <ul class="navbar-links">
      <li><a href="index.html">Inicio</a></li>
      <li><a href="movimientos.html">Movimientos</a></li>
      <li><a href="reportes.html" class="active">Reportes</a></li>
      <li><a href="inventario.html">Inventario</a></li>
      <li><a href="alertas.html">Alertas</a></li>
      <button id="theme-toggle" class="theme-btn">🌙</button>
    </ul>
  </nav>

  <header class="hero" data-aos="fade-up">
    <h1>Generar Reportes</h1>
    <p>Consulta detallada de movimientos registrados</p>
  </header>

  <main class="container">

    <section class="card" data-aos="fade-up">
      <h2>Filtros de búsqueda</h2>

      <form id="form-reportes" class="form-grid">
        <input type="date" id="desde" placeholder="Desde">
        <input type="date" id="hasta" placeholder="Hasta">
        <button type="submit" class="btn-primary">Generar Reporte</button>
      </form>
    </section>

    <section class="card" data-aos="fade-up">
      <h2>Resultados</h2>

      <table class="table">
        <thead>
          <tr>
            <th>Producto</th>
            <th>Categoría</th>
            <th>Entradas</th>
            <th>Salidas</th>
            <th>Total</th>
          </tr>
        </thead>
        <tbody id="tabla-resultados"></tbody>
      </table>
    </section>

  </main>

  <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script>
    // CONFIG FIREBASE
    const firebaseConfig = {
      apiKey: "AIzaSyB0S0gIC3efdIjONM7nZli2x4nwlgRTWNE",
      authDomain: "repregaher.firebaseapp.com",
      projectId: "repregaher",
      storageBucket: "repregaher.firebasestorage.app",
      messagingSenderId: "404425871100",
      appId: "1:404425871100:web:16cfdbca6427bc4e4e5179"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    firebase.auth().onAuthStateChanged((user) => {
      if (!user) {
        alert("Debes iniciar sesión o registrarte para acceder a esta sección.");
        window.location.href = "registro.html";
      }
    });

    AOS.init({ duration: 900, once: true });

    const toggleBtn = document.getElementById("theme-toggle");
    const currentTheme = localStorage.getItem("theme");

    if (currentTheme === "dark") {
      document.body.classList.add("dark-theme");
      toggleBtn.textContent = "☀️";
    }

    toggleBtn.addEventListener("click", () => {
      document.body.classList.toggle("dark-theme");
      if (document.body.classList.contains("dark-theme")) {
        toggleBtn.textContent = "☀️";
        localStorage.setItem("theme", "dark");
      } else {
        toggleBtn.textContent = "🌙";
        localStorage.setItem("theme", "light");
      }
    });
  </script>

</body>
</html>
