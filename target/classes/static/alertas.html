<body>

      <li><a href="alertas.html">Alertas</a></li>
      <button id="theme-toggle" class="theme-btn">🌙</button>
    </ul>
  </nav>

  <main>
    <section class="hero">
      <h1>Alertas de Abastecimiento</h1>
      <p>Productos con stock por debajo del mínimo permitido</p>
    </section>

    <section class="contenido">
      <h2>Productos críticos</h2>
      <ul id="lista-alertas">
        <!-- Productos con bajo stock -->
      </ul>
    </section>
  </main>
  <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script>
    // CONFIG FIREBASE
    const firebaseConfig = {
      apiKey: "AIzaSyB0S0gIC3efdIjONM7nZli2x4nwlgRTWNE",
      authDomain: "repregaher.firebaseapp.com",
      projectId: "repregaher",
      storageBucket: "repregaher.firebasestorage.app",
      messagingSenderId: "404425871100",
      appId: "1:404425871100:web:16cfdbca6427bc4e4e5179"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    firebase.auth().onAuthStateChanged((user) => {
      if (!user) {
        alert("Debes iniciar sesión o registrarte para acceder a esta sección.");
        window.location.href = "registro.html";
      }
    });

    AOS.init({ duration: 900, once: true });
    const toggleBtn = document.getElementById("theme-toggle");
const currentTheme = localStorage.getItem("theme");

if (currentTheme === "dark") {
  document.body.classList.add("dark-theme");
  toggleBtn.textContent = "☀️";
}

toggleBtn.addEventListener("click", () => {
  document.body.classList.toggle("dark-theme");

  if (document.body.classList.contains("dark-theme")) {
    toggleBtn.textContent = "☀️";
    localStorage.setItem("theme", "dark");
  } else {
    toggleBtn.textContent = "🌙";
    localStorage.setItem("theme", "light");
  }
});

  </script>
</body>
</html>
